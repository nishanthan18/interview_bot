[theme]
base = "dark"
primaryColor = "#5B8CFF"
backgroundColor = "#0B1020"
secondaryBackgroundColor = "#121A2F"
textColor = "#F5F7FB"
font = "sans serif"

[server]
headless = true
enableCORS = true
enableXsrfProtection = true

[browser]
serverAddress = "localhost"
serverPort = 8501

[client]
showSidebarNavigation = false